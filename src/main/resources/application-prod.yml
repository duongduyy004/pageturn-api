spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

logging:
  level:
    root: INFO
    com.pageturn.backend: INFO

app:
  jwt:
    secret: ${JWT_SECRET}
  storage:
    upload-dir: ${APP_STORAGE_UPLOAD_DIR:/opt/pageturn/uploads}
    public-dir: ${APP_STORAGE_PUBLIC_DIR:/opt/pageturn/public}
